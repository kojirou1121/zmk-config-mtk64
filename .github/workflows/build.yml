name: Build ZMK firmware

on: [push, pull_request, workflow_dispatch]

jobs:
  firmware_build:
    name: Build the ZMK firmware
    uses: zmkfirmware/zmk/.github/workflows/build-user-config.yml@main
    with:
      archive_name: zmk-firmwares

  dump_west_revisions:
    name: Dump west revisions (for pinning)
    runs-on: ubuntu-latest
    needs: firmware_build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install west
        run: |
          python -m pip install --upgrade pip
          pip install west

      - name: West init
        run: west init -l config

      - name: West update
        run: west update --fetch-opt=--filter=tree:0

      - name: Save west revisions (with HEAD SHAs)
        run: |
          west list -f "{name}\t{path}\n" \
            | while IFS=$'\t' read -r name path; do
                if [ -d "${path}/.git" ]; then
                  echo "${name} $(git -C "${path}" rev-parse HEAD)"
                else
                  echo "${name} (no-git-dir:${path})"
                fi
              done \
            | tee west-revisions.txt

      - name: Upload west revisions
        uses: actions/upload-artifact@v4
        with:
          name: west-revisions
          path: west-revisions.txt
