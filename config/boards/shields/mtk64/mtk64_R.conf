CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

CONFIG_ZMK_MOUSE=y

CONFIG_ZMK_BLE=y
CONFIG_ZMK_BLE_EXPERIMENTAL_FEATURES=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=1

CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

CONFIG_SPI=y
CONFIG_INPUT=y
CONFIG_ZMK_POINTING=y
CONFIG_PINCTRL=y

CONFIG_PMW3610_ALT=y

# ★R側ではEC11を有効化しない（DT側がdisabledのためwarningになる）
# CONFIG_EC11=y
# CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

CONFIG_BT_BAS=y
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

CONFIG_RGBLED_WIDGET=y
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_HIGH=50
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_CRITICAL=20

CONFIG_RGBLED_WIDGET_SHOW_LAYER_COLORS=y
CONFIG_RGBLED_WIDGET_LAYER_0_COLOR=0
CONFIG_RGBLED_WIDGET_LAYER_1_COLOR=5
CONFIG_RGBLED_WIDGET_LAYER_2_COLOR=6
CONFIG_RGBLED_WIDGET_LAYER_3_COLOR=3
CONFIG_RGBLED_WIDGET_LAYER_4_COLOR=2
CONFIG_RGBLED_WIDGET_LAYER_5_COLOR=4
CONFIG_RGBLED_WIDGET_LAYER_6_COLOR=7

# --- PMW3610 trackball stability / wake tuning ---
# force-awakeなしで、休眠への落ち方と復帰感を調整する

# USB運用時の反応を鋭くする目安。Kconfig側でもUSBのみなら8msが案内されている
CONFIG_PMW3610_ALT_REPORT_INTERVAL_MIN=8

# RUNからREST1へ落ちるまでを少し延ばす
CONFIG_PMW3610_ALT_RUN_DOWNSHIFT_TIME_MS=500

# 深いRESTへ落ちるまでを延ばす
CONFIG_PMW3610_ALT_REST1_DOWNSHIFT_TIME_MS=10000
CONFIG_PMW3610_ALT_REST2_DOWNSHIFT_TIME_MS=30000

# REST中の確認間隔を短くして、触り始めの鈍さを減らす
CONFIG_PMW3610_ALT_REST1_SAMPLE_TIME_MS=20
CONFIG_PMW3610_ALT_REST2_SAMPLE_TIME_MS=50
CONFIG_PMW3610_ALT_REST3_SAMPLE_TIME_MS=200
